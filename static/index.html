  kb+="\n═══ МЭС ЗАСАЛ ═══\n";
  Object.values(SURG).forEach(s=>{kb+=s.t+":\n";s.d.forEach(i=>{kb+=`  ${i.l}: ${i.d}\n`;});});

};

const offDiag=(text)=>{
  const t=text.toLowerCase();
  const all=[...DISEASES.gots.d,...DISEASES.haldvart.d,...DISEASES.haldvargui.d];
  const m=all.filter(d=>{const ss=d.s.toLowerCase().split(/[,;]/);return ss.some(s=>s.trim().length>3&&t.includes(s.trim().slice(0,6)))||t.includes(d.n.toLowerCase().slice(0,5));});
  if(!m.length)return null;
  let r="📋 **МЭДЭЭЛЛИЙН САНГИЙН ОНОШИЛГОО** (офлайн)\n\n";
  m.forEach((d,i)=>{r+=`${i+1}. **${d.n}**${d.z?" ⚠️ЗООНОЗ":""}\n   Шинж: ${d.s}\n`;if(d.t)r+=`   💊 ${d.t}\n`;if(d.q)r+=`   🛡️ ${d.q}\n`;r+="\n";});
  r+="⚠️ Урьдчилсан оношилгоо. Интернэттэй үед AI нарийвчлана.";return r;
};

        {mode==="diseases"&&(<div style={{animation:"fi 0.3s"}}>
          <div style={{display:"flex",gap:"3px",marginBottom:"8px"}}>{Object.entries(DISEASES).map(([k,v])=>(<button key={k} onClick={()=>{setDF(k);setEI(null);}} style={tb(dF===k)}>{v.l}</button>))}</div>
          {DISEASES[dF]?.d.map((d,i)=>(<div key={i} style={{marginBottom:"4px",borderRadius:"10px",border:"1px solid #ffffff06",background:eI===i?`${C.accent}06`:"rgba(255,255,255,0.012)",overflow:"hidden"}}>
            <button onClick={()=>setEI(eI===i?null:i)} style={{width:"100%",padding:"10px 12px",border:"none",background:"transparent",color:C.txt,cursor:"pointer",textAlign:"left",display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><span style={{fontWeight:600,fontSize:"12px"}}>{d.n}</span>{d.z&&<span style={{marginLeft:"6px",fontSize:"8px",color:"#FF8A80",background:"rgba(255,82,82,0.08)",padding:"2px 5px",borderRadius:"4px",fontWeight:600}}>ЗООНОЗ</span>}</div><span style={{fontSize:"10px",color:"#555",transition:"transform 0.2s",transform:eI===i?"rotate(180deg)":"none"}}>▼</span></button>
            {eI===i&&(<div style={{padding:"0 12px 12px",fontSize:"11px",lineHeight:1.6,animation:"fi 0.2s"}}><div><span style={{color:C.accent,fontWeight:600}}>Шинж:</span> {d.s}</div>{d.t&&<div style={{marginTop:"2px"}}><span style={{color:C.accent,fontWeight:600}}>💊:</span> {d.t}</div>}{d.q&&<div style={{marginTop:"4px",padding:"6px 8px",borderRadius:"6px",background:"rgba(255,152,0,0.04)",border:"1px solid rgba(255,152,0,0.08)"}}><span style={{color:"#FFB74D",fontWeight:600}}>🛡️</span> {d.q}</div>}<button onClick={()=>{setMode("chat");send(`${d.n} өвчний бүрэн оношилгоо, эмчилгээ, хорио цээрийн протокол бич.`);}} style={{marginTop:"6px",padding:"6px 14px",borderRadius:"8px",border:"none",background:`linear-gradient(135deg,${C.accent2},${C.accent})`,color:"#1a1a1a",cursor:"pointer",fontSize:"10px",fontWeight:700}}>⚕️ Дэлгэрэнгүй</button></div>)}
          </div>))}
        </div>)}

        {/* CALCULATOR */}
        {mode==="calc"&&(<div style={{animation:"fi 0.3s"}}>
          <h3 style={{fontSize:"14px",fontWeight:700,color:C.accent,margin:"0 0 10px"}}>🧮 Эмийн тун тооцоолуур</h3>
          <div style={{marginBottom:"8px"}}><p style={{fontSize:"9px",color:C.accent,fontWeight:700,marginBottom:"4px"}}>МАЛЫН ТӨРӨЛ</p><div style={{display:"flex",gap:"4px"}}>{ANIMALS.map(a=>(<button key={a.id} onClick={()=>{setCAnim(a.n);setCWt(a.w);}} style={tb(cAnim===a.n)}>{a.e} {a.n}</button>))}</div></div>
          <div style={{marginBottom:"8px"}}><p style={{fontSize:"9px",color:C.accent,fontWeight:700,marginBottom:"4px"}}>ЖИН (кг)</p><div style={{display:"flex",alignItems:"center",gap:"8px"}}><input type="range" min={5} max={800} value={cWt} onChange={e=>setCWt(+e.target.value)} style={{flex:1,accentColor:C.accent}}/><input type="number" value={cWt} onChange={e=>setCWt(+e.target.value||0)} style={{width:"60px",padding:"6px 8px",borderRadius:"8px",background:"rgba(255,255,255,0.04)",border:`1px solid ${C.accent}15`,color:C.txt,fontSize:"14px",textAlign:"center",outline:"none",fontWeight:700}}/><span style={{fontSize:"11px",color:C.txt3}}>кг</span></div></div>
          <div style={{marginBottom:"10px"}}><p style={{fontSize:"9px",color:C.accent,fontWeight:700,marginBottom:"4px"}}>ЭМ</p><div style={{display:"flex",gap:"3px",flexWrap:"wrap"}}>{DRUGS.map((d,i)=>(<button key={i} onClick={()=>setCDrug(i)} style={{...tb(cDrug===i),fontSize:"9px"}}>{d.name}</button>))}</div></div>
          <div style={{padding:"14px",borderRadius:"12px",background:`${C.accent}08`,border:`1px solid ${C.accent}20`}}>
            <div style={{fontSize:"14px",fontWeight:700,color:C.accent,marginBottom:"4px"}}>{drug.name}</div>
            <div style={{fontSize:"10px",color:C.txt3}}>Концентраци: {drug.conc} | Зам: {drug.route} | {drug.freq}</div>
            {drug.wd&&<div style={{fontSize:"10px",color:"#FFB74D",marginTop:"2px"}}>⏱️ Хаялт: {drug.wd}</div>}
            {dpk===0?(<div style={{fontSize:"14px",color:"#FF5252",fontWeight:700,marginTop:"10px"}}>⚠️ {cAnim}-д ХОРИГЛОНО!</div>):(<div style={{marginTop:"8px",padding:"12px",background:"rgba(0,0,0,0.25)",borderRadius:"10px"}}>
              <div style={{fontSize:"11px",color:C.txt3}}>{dpk} {drug.iu?"IU":"мг"}/кг × {cWt}кг =</div>
              {!drug.dm&&<div style={{fontSize:"16px",fontWeight:700,color:C.txt}}>{td.toLocaleString()} {drug.iu?"IU":"мг"}</div>}
              <div style={{fontSize:"28px",fontWeight:800,color:C.accent,marginTop:"4px"}}>{ml.toFixed(1)} мл</div>
            </div>)}
            <button onClick={()=>{setMode("chat");send(`${drug.name} ${cAnim}-д ${cWt}кг жинтэй малд хэрэглэх бүрэн заавар бич.`);}} style={{marginTop:"8px",padding:"8px",borderRadius:"8px",border:"none",background:`linear-gradient(135deg,${C.accent2},${C.accent})`,color:"#1a1a1a",cursor:"pointer",fontSize:"11px",fontWeight:700,width:"100%"}}>⚕️ Дэлгэрэнгүй заавар</button>
          </div>
        </div>)}

        {/* LAB / REPRO / SURGERY — generic list renderer */}
        {["lab","repro","surg"].includes(mode)&&(<div style={{animation:"fi 0.3s"}}>
          {(()=>{const DB=mode==="lab"?LAB:mode==="repro"?REPRO:SURG;return<><div style={{display:"flex",gap:"3px",marginBottom:"8px",flexWrap:"wrap"}}>{Object.entries(DB).map(([k,v])=>(<button key={k} onClick={()=>{setSub(k);setEI(null);}} style={tb(sub===k||(!sub&&k===Object.keys(DB)[0]))}>{v.t}</button>))}</div>{(DB[sub||Object.keys(DB)[0]]?.d||[]).map((item,i)=>(card(<div key={i}><div style={{display:"flex",alignItems:"center",gap:"6px",marginBottom:"3px"}}><span style={{fontSize:"16px"}}>{item.i}</span><span style={{fontWeight:600,fontSize:"12px",color:C.accent}}>{item.l}</span></div><p style={{fontSize:"11px",color:C.txt2,margin:0,lineHeight:1.6}}>{item.d}</p></div>)))}<button onClick={()=>{setMode("chat");send(`${DB[sub||Object.keys(DB)[0]]?.t} дэлгэрэнгүй заавар бич.`);}} style={{marginTop:"4px",padding:"8px",borderRadius:"8px",border:"none",background:`linear-gradient(135deg,${C.accent2},${C.accent})`,color:"#1a1a1a",cursor:"pointer",fontSize:"10px",fontWeight:700,width:"100%"}}>⚕️ AI дэлгэрэнгүй</button></>;})()}
        </div>)}

        {/* REGIONS */}
        {mode==="region"&&(<div style={{animation:"fi 0.3s"}}><h3 style={{fontSize:"13px",fontWeight:700,color:C.accent,margin:"0 0 8px"}}>🗺️ Бүс нутгийн эпидемиологи</h3>{REGIONS.map((r,i)=>(card(<div key={i}><div style={{fontWeight:700,fontSize:"12px",color:C.accent,marginBottom:"2px"}}>{r.r}</div><div style={{fontSize:"9px",color:C.txt3,marginBottom:"4px"}}>{r.a}</div><div style={{fontSize:"11px",color:C.txt2,lineHeight:1.5}}><div><span style={{color:"#FF8A80",fontWeight:600}}>Өвчин:</span> {r.d}</div><div><span style={{color:"#FFB74D",fontWeight:600}}>Эрсдэл:</span> {r.risk}</div><div><span style={{color:C.accent,fontWeight:600}}>Вакцин:</span> {r.v}</div></div><button onClick={()=>{setMode("chat");send(`${r.r} бүсийн дэлгэрэнгүй эпидемиологи бич.`);}} style={{marginTop:"6px",padding:"4px 12px",borderRadius:"6px",border:"none",background:`${C.accent}20`,color:C.accent,cursor:"pointer",fontSize:"9px",fontWeight:600}}>⚕️ AI</button></div>)))}</div>)}

        {/* HISTORY */}
        {mode==="history"&&(<div style={{animation:"fi 0.3s"}}><h3 style={{fontSize:"13px",fontWeight:700,color:C.accent,margin:"0 0 8px"}}>💾 Кейс түүх ({cases.length})</h3>{cases.map((c,i)=>(<div key={i} style={{marginBottom:"5px",padding:"10px",borderRadius:"8px",border:"1px solid #ffffff06",background:"rgba(255,255,255,0.012)"}}><div style={{fontSize:"9px",color:C.txt3,marginBottom:"3px"}}>{new Date(c.d).toLocaleDateString("mn-MN")}</div><div style={{fontSize:"11px",color:C.accent,fontWeight:600,marginBottom:"2px"}}>{c.q.slice(0,80)}</div><div style={{fontSize:"10px",color:C.txt2,lineHeight:1.4}}>{c.a.slice(0,200)}...</div></div>))}</div>)}

        {/* TRIAGE */}
        {mode==="triage"&&(<div style={{animation:"fi 0.3s"}}>
          <div style={{marginBottom:"10px"}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:"4px"}}><span style={{fontSize:"9px",color:C.accent,fontWeight:700}}>АНАМНЕЗ ЦУГЛУУЛАЛТ</span><span style={{fontSize:"9px",color:C.txt3}}>{tS+1}/{TQ.length}</span></div><div style={{height:"3px",background:"#ffffff08",borderRadius:"2px"}}><div style={{height:"100%",width:`${((tS+1)/TQ.length)*100}%`,background:`linear-gradient(90deg,${C.accent2},${C.accent})`,borderRadius:"2px",transition:"width 0.3s"}}/></div></div>
          <div style={{display:"flex",gap:"8px",marginBottom:"10px",padding:"10px",background:`${C.accent}06`,borderRadius:"10px"}}><span style={{fontSize:"24px"}}>{anim?.e}</span><div><div style={{fontSize:"12px",fontWeight:600,color:C.accent}}>{anim?.n}</div><div style={{fontSize:"10px",color:C.txt3}}>{sys?.i} {sys?.n}</div></div></div>
          {Object.entries(tD).map(([q,a],i)=>(<div key={i} style={{marginBottom:"3px",padding:"6px 8px",background:"rgba(255,255,255,0.015)",borderRadius:"6px",fontSize:"10px"}}><div style={{color:C.txt3}}>{q}</div><div style={{color:C.accent,fontWeight:500}}>{a}</div></div>))}
          <div style={{padding:"12px",background:`${C.accent}06`,borderRadius:"12px",border:`1px solid ${C.accent}15`,marginBottom:"8px"}}><div style={{fontSize:"9px",color:C.accent,fontWeight:700,marginBottom:"4px"}}>АСУУЛТ {tS+1}</div><div style={{fontSize:"14px",fontWeight:600,color:C.txt}}>{TQ[tS]}</div></div>
          <div style={{display:"flex",gap:"4px"}}><input autoFocus value={inp} onChange={e=>setInp(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&inp.trim())tAns(inp.trim());}} placeholder="Хариулт..." style={{flex:1,padding:"10px 12px",borderRadius:"10px",background:"rgba(255,255,255,0.03)",border:`1px solid ${C.accent}12`,color:C.txt,fontSize:"13px",outline:"none",fontFamily:"inherit"}}/><button onClick={()=>inp.trim()&&tAns(inp.trim())} disabled={!inp.trim()} style={{padding:"10px 16px",borderRadius:"10px",border:"none",background:inp.trim()?`linear-gradient(135deg,${C.accent2},${C.accent})`:"rgba(255,255,255,0.02)",color:inp.trim()?"#1a1a1a":"#555",cursor:inp.trim()?"pointer":"default",fontWeight:700}}>→</button></div>
          <div style={{display:"flex",gap:"4px",marginTop:"4px"}}>{["Мэдэхгүй","Хэмжээгүй"].map(b=>(<button key={b} onClick={()=>tAns(b)} style={{padding:"4px 10px",borderRadius:"6px",border:"1px solid #ffffff06",background:"transparent",color:C.txt3,cursor:"pointer",fontSize:"10px"}}>{b}</button>))}</div>
        </div>)}

        {/* CHAT */}
        {mode==="chat"&&msgs.map((m,i)=>(<div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start",gap:"6px",alignItems:"flex-start"}}>
          {m.role==="assistant"&&<div style={{width:26,height:26,borderRadius:"8px",background:`linear-gradient(135deg,${C.accent2},${C.accent})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"14px",flexShrink:0,marginTop:"2px"}}>⚕️</div>}
          <div style={m.role==="user"?{maxWidth:"82%",padding:"10px 14px",borderRadius:"16px 16px 4px 16px",background:`linear-gradient(135deg,${C.accent2},${C.accent})`,fontSize:"12px",lineHeight:1.5,color:"#1a1a1a",fontWeight:500}:{maxWidth:"90%",padding:"12px 14px",borderRadius:"16px 16px 16px 4px",background:"rgba(255,255,255,0.03)",border:"1px solid #ffffff06",lineHeight:1.6}}>
            {m.role==="assistant"?fmt(m.content):<span>{m.content}</span>}
          </div>
        </div>))}
        {load&&(<div style={{display:"flex",gap:"6px",alignItems:"flex-start"}}><div style={{width:26,height:26,borderRadius:"8px",background:`linear-gradient(135deg,${C.accent2},${C.accent})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"14px",flexShrink:0}}>⚕️</div><div style={{padding:"12px 16px",borderRadius:"16px 16px 16px 4px",background:"rgba(255,255,255,0.03)",border:"1px solid #ffffff06",display:"flex",gap:"5px",alignItems:"center"}}><style>{`@keyframes p{0%,100%{opacity:.2}50%{opacity:1}}`}</style>{[0,1,2].map(i=><div key={i} style={{width:6,height:6,borderRadius:"50%",background:C.accent,animation:"p 1.4s infinite",animationDelay:`${i*0.2}s`}}/>)}<span style={{fontSize:"10px",color:C.txt3,marginLeft:"4px"}}>Эмч Отгоо шинжилж байна...</span></div></div>)}
        <div ref={er}/>
      </div>

      {/* INPUT */}
      {/* CHAT INPUT — БҮХҮН ХУУДСАНД */}
      <div style={{padding:"10px 14px 16px",flexShrink:0,background:"rgba(10,15,10,0.8)",borderTop:"1px solid rgba(139,195,74,0.06)"}}>
        <div style={{display:"flex",gap:"6px",alignItems:"flex-end"}}>
          <button onClick={()=>fr.current?.click()} style={{width:36,height:36,borderRadius:"10px",border:`1px solid ${C.accent}12`,background:"rgba(255,255,255,0.02)",color:C.accent,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"16px",flexShrink:0}}>📷</button>
          <div style={{flex:1,display:"flex",alignItems:"flex-end",background:"rgba(255,255,255,0.025)",borderRadius:"12px",border:`1px solid ${C.accent}10`,padding:"3px"}}>
            <textarea ref={ir} value={inp} onChange={e=>{setInp(e.target.value);e.target.style.height="auto";e.target.style.height=Math.min(e.target.scrollHeight,100)+"px";}} onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();if(mode!=="chat")setMode("chat");send(inp);}}} placeholder="Эмч Отгоо-оос асуух..." rows={1} style={{flex:1,background:"transparent",border:"none",outline:"none",color:C.txt,fontSize:"13px",padding:"8px 10px",resize:"none",maxHeight:"100px",lineHeight:1.4,fontFamily:"inherit"}}/>
          </div>
          <button onClick={()=>{if(mode!=="chat")setMode("chat");send(inp);}} disabled={!inp.trim()||load} style={{width:36,height:36,borderRadius:"10px",border:"none",background:inp.trim()&&!load?`linear-gradient(135deg,${C.accent2},${C.accent})`:"rgba(255,255,255,0.02)",color:inp.trim()&&!load?"#1a1a1a":"#555",cursor:inp.trim()&&!load?"pointer":"default",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"16px",flexShrink:0,fontWeight:800}}>↑</button>
        </div>
        <p style={{textAlign:"center",fontSize:"8px",color:`${C.accent}25`,marginTop:"6px",marginBottom:0}}>⚕️ Мэргэжлийн малын эмчийн үзлэгийг орлохгүй</p>
      </div>

      <style>{`@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}input::placeholder,textarea::placeholder{color:#4a6a4a}input[type=range]{height:4px}::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:${C.accent}15;border-radius:2px}`}</style>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));

// Register Service Worker
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/sw.js').catch(()=>{});
}
</script>
</body>
</html>
